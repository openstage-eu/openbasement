site_name: openbasement
site_url: https://openstage-eu.github.io/openbasement/
site_description: Template-based RDF extraction from EU Cellar data
repo_url: https://github.com/openstage-eu/openbasement

theme:
  name: openstage
  subsite:
    text: openstage-eu
    url: https://github.com/openstage-eu

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Templates:
    - Guide: templates.md
    - Built-in Reference: template-reference.md
  - Reference:
    - API: api.md
    - CDM Patterns: cdm-patterns.md
  - Audit Coverage: audit.md

plugins:
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3
            docstring_style: google
            members_order: source
